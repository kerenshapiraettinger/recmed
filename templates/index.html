{% extends "base.html" %}
{% block title %}RecMed{% endblock %}
{% block content %}
<div class="hero">
  <h1>RecMed</h1>
  <p class="tagline">{{ t.index_tagline }}</p>

  <div class="profile-cards">
    {% for pid, name in profiles.items() %}
    <div class="profile-card {% if profile and profile.id == pid %}active{% endif %}">
      <a href="{{ url_for('set_profile', pid=pid) }}" class="profile-card-link">
        <div class="profile-avatar">{{ name[0] }}</div>
        <div class="profile-name">{{ name }}</div>
      </a>
      <form class="rename-form" method="post"
            action="{{ url_for('rename_profile', pid=pid) }}">
        <input class="rename-input" type="text" name="name"
               placeholder="{{ t.rename_placeholder }}" maxlength="30">
        <button class="btn btn-sm" type="submit">{{ t.btn_save }}</button>
      </form>
    </div>
    {% endfor %}

    {# Add User card #}
    <div class="profile-card add-user-card">
      <form method="post" action="{{ url_for('add_profile') }}" class="add-user-form">
        <div class="profile-avatar add-user-avatar">+</div>
        <input class="rename-input" type="text" name="name"
               placeholder="{{ t.add_user_placeholder }}" maxlength="30" required>
        <button class="btn btn-sm" type="submit">{{ t.add_user }}</button>
      </form>
    </div>

  </div>
</div>
{% endblock %}
