<!DOCTYPE html>
<html lang="{{ lang }}" {% if lang == 'he' %}dir="rtl"{% endif %}>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}RecMed{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" href="/">RecMed</a>
    <div class="nav-links">
      {% if profile %}
        <span class="nav-profile">{{ profile.name }}</span>
        <a href="{{ url_for('recommendations') }}">{{ t.nav_recs }}</a>
        <a href="{{ url_for('browse') }}">{{ t.nav_browse }}</a>
        <a href="{{ url_for('watched') }}">{{ t.nav_watched }}</a>
        <a href="{{ url_for('search') }}">{{ t.nav_search }}</a>
        <a href="/">{{ t.nav_home }}</a>
      {% endif %}
      <a class="btn btn-sm lang-btn"
         href="{{ url_for('set_lang', lang='he' if lang == 'en' else 'en') }}">
        {{ t.lang_toggle }}
      </a>
    </div>
  </nav>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
